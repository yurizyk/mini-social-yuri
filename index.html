<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Mini Social</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
</head>
<body>

<header>
  <h1 class="logo">Mini Social</h1>
</header>

<main class="feed">

  <article class="post">
    <div class="post-header">
      <img src="assets/Wikipe-tan_full_length.png" class="avatar">
      <div>
        <span class="name">yurizyk</span>
        <span class="username">@yurizyk_</span>
      </div>
    </div>

    <p class="post-text">
      Hoje iremos aprender a fazer gelo agachando no free fire🚀
    </p>

    <div class="post-actions">
      <button id="likeBtn"> Curtir👍</button>
<button id="deslikeBtn"> Descurtir👎</button>
<p>
Curtidas: <span id="likeCount">0</span> |
Descurtidas: <span id="deslikeCount">0</span>
</p>
    </div>

    <section class="comments">
      <div class="comment">
        <img src="assets/avatar.png" class="avatar-small">
        <p>Já estva esperando essa hora! 🔥</p>
      </div>

      <div class="comment">
        <img src="assets/avatar.png" class="avatar-small">
        <p>Agora eu pulo dando três capas!</p>
      </div>
    </section>

  </article>

</main>

<script src="js/script.js"></script>
</body>
</html>
